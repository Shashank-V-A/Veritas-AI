<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veritas AI</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 320px;
        font-family: system-ui, sans-serif;
        background: #1a1a1f;
        color: #f0ede6;
      }
      .wrap { padding: 16px; }
      h1 {
        margin: 0 0 4px;
        font-size: 16px;
        font-weight: 600;
      }
      p { margin: 0 0 12px; font-size: 12px; color: #8a8580; }
      button {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #8b2942;
        background: #8b2942;
        color: #fafaf8;
        font-size: 13px;
        cursor: pointer;
      }
      button:hover { background: #a03350; }
      button:disabled { opacity: 0.6; cursor: wait; }
      .status { margin-top: 10px; font-size: 11px; min-height: 16px; }
      .error { color: #e88; }
      .ok { color: #6c9; }
      label { display: block; font-size: 11px; margin: 12px 0 4px; color: #8a8580; }
      input {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #444;
        background: #252530;
        color: #f0ede6;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Veritas AI</h1>
      <p>Verify the current page or selection.</p>
      <button type="button" id="verify">Verify this page</button>
      <p class="status" id="status" aria-live="polite"></p>
      <label for="appUrl">App URL</label>
      <input id="appUrl" type="url" placeholder="http://localhost:5173" />
    </div>
    <script src="popup.js"></script>
  </body>
</html>
